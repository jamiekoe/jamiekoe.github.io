<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | Jamie Koerner</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="error-page" id="home">
      <section class="hero" aria-labelledby="error-title">
        <div class="hero-copy">
          <p class="eyebrow">404</p>
          <h1 id="error-title">This page is missing.</h1>
          <p>
            The link may be outdated, or the page may have moved. Head back to
            the homepage and keep browsing.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="./">Go Home</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
